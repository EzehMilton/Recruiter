spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:disabled}
      chat:
        options:
          model: gpt-4o-mini
    retry:
      max-attempts: 2
  application:
    name: recruiter
  datasource:
    url: jdbc:h2:file:./data/recruiter;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 100MB

server:
  port: 8080

recruitment:
  shortlist-count: 3
  max-job-description-words: 1000
  analysis-cap: 20
  # upload-processing-cap: 500  # operational safety ceiling, defaults to 500 if unset
  minimum-shortlist-score: 75.0
  max-file-size-bytes: 5242880  # 5 MB
