spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:disabled}
      chat:
        options:
          model: gpt-4o-mini
    retry:
      max-attempts: 2
  application:
    name: recruiter
  datasource:
    url: jdbc:h2:file:./data/recruiter;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 1MB
      max-request-size: 110MB

server:
  port: 8080

recruitment:
  shortlist-count: 3
  max-job-description-words: 1000
  analysis-cap: 20
  # upload-processing-cap: 500  # operational safety ceiling, defaults to 500 if unset
  default-shortlist-quality: VERY_GOOD
  max-file-size-bytes: 1048576  # 1 MB
  default-sector: generic  # fallback sector when UI leaves the field blank
  ai-cost:
    prompt-price-per-million: 0.15
    completion-price-per-million: 0.60
